<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal - HISJB</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; padding: 20px; text-transform: uppercase; }
        .container { max-width: 450px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; text-transform: uppercase; }
        button { background: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; }
        #resultado { display: none; background: #d4edda; border: 2px solid #c3e6cb; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center; color: #333;">RESERVA DE MENÚ</h2>
        <input type="text" id="nombre" placeholder="APELLIDO Y NOMBRE" required>
        <input type="number" id="dni" placeholder="DNI (SÓLO NÚMEROS)" required>
        <input type="text" id="area" placeholder="ÁREA DONDE TRABAJA" required>
        <select id="turno">
            <option value="MAÑANA">TURNO MAÑANA</option>
            <option value="NOCHE">TURNO NOCHE</option>
        </select>
        <select id="dieta">
            <option value="GENERAL">DIETA GENERAL</option>
            <option value="HIPOSÓDICA">HIPOSÓDICA</option>
            <option value="DIABÉTICA">DIABÉTICA</option>
        </select>
        <button onclick="enviar()">GENERAR CÓDIGO DE RETIRO</button>

        <div id="resultado">
            <p style="margin: 0;">TU CÓDIGO ES:</p>
            <h1 id="codigo" style="font-size: 3rem; margin: 10px 0; color: #155724;"></h1>
            <p style="font-size: 0.8rem;">PRESÉNTALO EN COCINA PARA RETIRAR</p>
        </div>
    </div>

    <script>
        const API = 'TU_URL_DE_APPS_SCRIPT';
        function enviar() {
            const btn = document.querySelector('button');
            btn.disabled = true; btn.innerText = "PROCESANDO...";
            
            fetch(API, {
                method: 'POST',
                body: JSON.stringify({
                    action: "generar_codigo",
                    nombre: document.getElementById('nombre').value,
                    dni: document.getElementById('dni').value,
                    area: document.getElementById('area').value,
                    turno: document.getElementById('turno').value,
                    dieta: document.getElementById('dieta').value
                })
            })
            .then(res => res.json())
            .then(res => {
                document.getElementById('codigo').innerText = res.codigo;
                document.getElementById('resultado').style.display = 'block';
                btn.innerText = "LISTO";
            });
        }
    </script>
</body>
</html>
