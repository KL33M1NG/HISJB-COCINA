<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE NUTRICIÓN - HISJB</title>
    <style>
        :root { --blue-hosp: #0056b3; --light-bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light-bg); margin: 0; text-transform: uppercase; }
        header { background: var(--blue-hosp); color: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        .menu-status { font-weight: bold; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .no-menu { background: #ffe3e3; color: #d93025; }
        .has-menu { background: #e6f4ea; color: #1e8e3e; }
        .btn-solicitar { background: var(--blue-hosp); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 1.2rem; cursor: pointer; display: none; width: 100%; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <h1>HOSPITAL INTERZONAL SAN JUAN BAUTISTA</h1>
    <p>SISTEMA DIGITAL DE NUTRICIÓN</p>
</header>

<div class="container">
    <div class="card">
        <div id="statusMenu" class="menu-status no-menu">CONSULTANDO MENÚ DEL DÍA...</div>
        
        <div id="detalleMenu" style="margin-bottom: 20px; display: none;">
            <h3 style="color: #555;">MENÚ DE HOY:</h3>
            <p id="platoNombre" style="font-size: 1.4rem; color: var(--blue-hosp); font-weight: bold;"></p>
        </div>

        <div id="formularioPersonal" style="display: none;">
            <hr>
            <h3>SOLICITUD DE VIANDA</h3>
            <input type="text" id="nombre" placeholder="APELLIDO Y NOMBRE">
            <input type="number" id="dni" placeholder="DNI">
            <select id="dieta">
                <option value="GENERAL">GENERAL</option>
                <option value="HIPOSÓDICA">HIPOSÓDICA</option>
                <option value="DIABÉTICA">DIABÉTICA</option>
            </select>
            <button id="btnAccion" class="btn-solicitar" onclick="enviarPedido()">SOLICITAR</button>
        </div>
    </div>
</div>

<script>
    const API = 'TU_URL_DE_APPS_SCRIPT';

    // 1. Al cargar, verificamos si hay menú
    window.onload = async () => {
        const resp = await fetch(API + '?action=obtener_menu');
        const data = await resp.json();

        if (data.datos && data.datos.length > 0) {
            const menu = data.datos[0]; // Tomamos el primero publicado
            document.getElementById('statusMenu').innerText = "MENÚ DISPONIBLE";
            document.getElementById('statusMenu').className = "menu-status has-menu";
            document.getElementById('platoNombre').innerText = menu[2]; // Columna PLATO
            document.getElementById('detalleMenu').style.display = 'block';
            document.getElementById('formularioPersonal').style.display = 'block';
            
            // Lógica de botón según hora (Ej: Almuerzo hasta las 15hs)
            const hora = new Date().getHours();
            const btn = document.getElementById('btnAccion');
            btn.style.display = 'block';
            btn.innerText = (hora < 15) ? "SOLICITAR ALMUERZO" : "SOLICITAR CENA";
        } else {
            document.getElementById('statusMenu').innerText = "MENÚ NO CARGADO TODAVÍA";
        }
    };

    async function enviarPedido() {
        // ... (Tu función de enviar pedido que ya funciona) ...
    }
</script>
</body>
</html>
