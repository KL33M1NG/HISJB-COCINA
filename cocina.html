<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cocina - HISJB</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #343a40; color: white; padding: 20px; text-transform: uppercase; }
        .card { max-width: 500px; margin: auto; background: #495057; padding: 30px; border-radius: 15px; text-align: center; }
        input { width: 200px; font-size: 2.5rem; text-align: center; border-radius: 10px; border: none; margin-bottom: 20px; text-transform: uppercase; }
        .btn-check { background: #28a745; color: white; padding: 20px 40px; font-size: 1.5rem; border: none; cursor: pointer; border-radius: 10px; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h2>VALIDACIÓN DE COMIDA</h2>
        <p>INGRESE EL CÓDIGO DE 4 DÍGITOS:</p>
        <input type="text" id="cod" maxlength="4" placeholder="....">
        <button class="btn-check" onclick="validar()">CONFIRMAR ENTREGA</button>
        <div id="info" style="margin-top: 20px; font-size: 1.2rem; color: #ffc107;"></div>
    </div>

    <script>
        const API = 'TU_URL_DE_APPS_SCRIPT';
        function validar() {
            const cod = document.getElementById('cod').value;
            fetch(API, {
                method: 'POST',
                body: JSON.stringify({ action: "validar_codigo", codigo: cod })
            })
            .then(res => res.json())
            .then(res => {
                if(res.status === "success") {
                    document.getElementById('info').innerText = "ENTREGA EXITOSA: " + res.nombre;
                    document.getElementById('cod').value = "";
                } else {
                    alert(res.message);
                }
            });
        }
    </script>
</body>
</html>
