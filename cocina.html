<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>COCINA - HISJB</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; text-transform: uppercase; }
        .container { max-width: 900px; margin: auto; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        h2, h3 { color: #0056b3; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin: 15px 0; }
        .stat-card { background: #e9ecef; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-number { font-size: 2.5rem; font-weight: bold; color: #0056b3; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; margin: 5px; }
        .btn-primary { background: #0056b3; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        input { width: 100%; padding: 15px; font-size: 1.5rem; text-align: center; border: 2px solid #ccc; border-radius: 8px; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .mensaje { margin-top: 10px; font-weight: bold; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .turno-activo { font-size: 1.2rem; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>🍽️ PANEL DE COCINA</h2>
        <div class="turno-activo" id="turnoInfo"></div>
        
        <h3>📊 PEDIDOS PENDIENTES</h3>
        <div class="stats-grid" id="resumenDietas"></div>
        <div><strong>Total pendientes:</strong> <span id="totalPendientes">0</span></div>

        <h3>🔍 VALIDAR ENTREGA</h3>
        <input type="text" id="codigoInput" placeholder="CÓDIGO 4 CARACTERES" maxlength="4">
        <button class="btn btn-primary" onclick="validarCodigo()">✅ VALIDAR ENTREGA</button>
        <div id="mensajeValidacion" class="mensaje"></div>

        <h3>📋 LISTA DE PENDIENTES</h3>
        <table id="tablaPendientes">
            <thead><tr><th>Código</th><th>Nombre</th><th>Dieta</th><th>Acción</th></tr></thead>
            <tbody></tbody>
        </table>
        <button class="btn btn-primary" onclick="cargarPendientes()">🔄 ACTUALIZAR</button>
    </div>

    <div class="card">
        <h3>🔒 CERRAR TURNO</h3>
        <button class="btn btn-danger" onclick="cerrarTurno()">🚫 CERRAR TURNO</button>
        <div id="mensajeCierre" class="mensaje"></div>
    </div>
</div>

<script>
    const API = 'https://script.google.com/macros/s/AKfycbxHD6Iw8b1CY6I-rBPqW4r0OH8VufajI0sxQZDVWnx9yLyWFhIYT2nWv-YeZiGYkwD2/exec';
    const hora = new Date().getHours();
    const turnoActual = (hora < 15) ? "MAÑANA" : "NOCHE";
    document.getElementById('turnoInfo').innerText = `TURNO: ${turnoActual === "MAÑANA" ? "ALMUERZO" : "CENA"}`;

    let intervalo = setInterval(cargarPendientes, 15000);
    cargarPendientes();

    function cargarPendientes() {
        const callbackName = 'cocinaCallback_' + Date.now();
        window[callbackName] = function(data) {
            delete window[callbackName];
            document.body.removeChild(script);
            
            if (data.error) return;
            
            const conteo = data.conteoDietas || {};
            const resumenDiv = document.getElementById('resumenDietas');
            resumenDiv.innerHTML = '';
            ['GENERAL', 'HIPOSÓDICA', 'DIABÉTICA', 'CELIACA', 'GÁSTRICA'].forEach(d => {
                resumenDiv.innerHTML += `<div class="stat-card"><div>${d}</div><div class="stat-number">${conteo[d] || 0}</div></div>`;
            });
            document.getElementById('totalPendientes').innerText = data.totalPendientes || 0;

            const tbody = document.querySelector('#tablaPendientes tbody');
            tbody.innerHTML = '';
            if (!data.listaPendientes || data.listaPendientes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4">✅ No hay pedidos pendientes</td></tr>';
                return;
            }
            data.listaPendientes.forEach(p => {
                tbody.innerHTML += `<tr><td><strong>${p.codigo}</strong></td><td>${p.nombre}</td><td>${p.dieta}</td><td><button class="btn btn-success" onclick="entregarRapido('${p.codigo}')">✔ Entregar</button></td></tr>`;
            });
        };
        
        const script = document.createElement('script');
        script.src = API + '?action=obtener_pendientes&callback=' + callbackName;
        document.body.appendChild(script);
    }

    function validarCodigo() {
        const codigo = document.getElementById('codigoInput').value.trim().toUpperCase();
        const msgDiv = document.getElementById('mensajeValidacion');
        if (codigo.length !== 4) { msgDiv.innerHTML = "❌ Código debe tener 4 caracteres"; msgDiv.className = "mensaje error"; return; }

        const callbackName = 'validarCallback_' + Date.now();
        window[callbackName] = function(data) {
            delete window[callbackName];
            document.body.removeChild(script);
            if (data.status === "success") {
                msgDiv.innerHTML = `✅ ENTREGADO a ${data.nombre} (${data.dieta})`;
                msgDiv.className = "mensaje success";
                document.getElementById('codigoInput').value = '';
                cargarPendientes();
            } else {
                msgDiv.innerHTML = `❌ ${data.message}`;
                msgDiv.className = "mensaje error";
            }
        };
        
        const script = document.createElement('script');
        script.src = API + '?action=validar_codigo&codigo=' + codigo + '&callback=' + callbackName;
        document.body.appendChild(script);
    }

    function entregarRapido(codigo) { document.getElementById('codigoInput').value = codigo; validarCodigo(); }

    function cerrarTurno() {
        if (!confirm("¿Cerrar turno? Se generará el reporte.")) return;
        const msgDiv = document.getElementById('mensajeCierre');
        const callbackName = 'cierreCallback_' + Date.now();
        
        window[callbackName] = function(data) {
            delete window[callbackName];
            document.body.removeChild(script);
            msgDiv.innerHTML = data.status === "success" ? `✅ ${data.message}` : `❌ ${data.message}`;
            msgDiv.className = data.status === "success" ? "mensaje success" : "mensaje error";
        };
        
        const script = document.createElement('script');
        script.src = API + '?action=cerrar_turno&turno=' + turnoActual + '&callback=' + callbackName;
        document.body.appendChild(script);
    }

    window.addEventListener('beforeunload', () => clearInterval(intervalo));
</script>
</body>
</html>
