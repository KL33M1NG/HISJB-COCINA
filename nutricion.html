<div class="card">
    <h2>CARGA DE MENÚ - NUTRICIÓN</h2>
    <select id="nTurno"><option value="MAÑANA">ALMUERZO</option><option value="NOCHE">CENA</option></select>
    <input type="text" id="nPlato" placeholder="PLATO PRINCIPAL">
    <p>ESTA CARGA HABILITARÁ EL FORMULARIO PARA EL PERSONAL</p>
    <button onclick="cargar()">PUBLICAR MENÚ</button>
</div>
<script>
    async function cargar() {
        const datos = {
            action: "cargar_menu",
            turno: document.getElementById('nTurno').value,
            plato: document.getElementById('nPlato').value,
            dietas: "GENERAL, HIPOSÓDICA, DIABÉTICA, CELIACA, GÁSTRICA"
        };
        await fetch('TU_URL_DE_APPS_SCRIPT', { method: 'POST', body: JSON.stringify(datos) });
        alert("MENÚ PUBLICADO EXITOSAMENTE");
    }
</script>
